name: MDK Core CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "core/**"
      - ".github/workflows/core.yaml"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "lts/*"
  CORE_DIR: core

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          vulnerability-check: true
          license-check: true
          comment-summary-in-pr: always

  core-ci:
    name: Core CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.CORE_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: npm
          cache_dependency_path: ${{ env.CORE_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lockfile consistency check
        continue-on-error: true
        run: |
          npm install --package-lock-only --no-audit --no-fund
          git diff --exit-code package-lock.json || (
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' and commit the updated lockfile."
            exit 1
          )

      - name: Security audit
        continue-on-error: true
        run: |
          npm audit signatures 2>&1 || echo "::warning::Signature verification reported issues"
          npm audit --audit-level=high 2>&1 || echo "::warning::High severity vulnerabilities detected"

      - name: Lint
        continue-on-error: true
        run: npm run lint --if-present

      - name: Typecheck
        continue-on-error: true
        run: npm run typecheck --if-present

      - name: Test with coverage
        continue-on-error: true
        run: npm run test:coverage --if-present || npm test --if-present

      - name: Build
        continue-on-error: true
        run: npm run build --if-present

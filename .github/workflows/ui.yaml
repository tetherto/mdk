name: MDK UI CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "ui-client/**"
      - ".github/workflows/ui.yaml"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "lts/*"
  PNPM_VERSION: "10.5.0"
  UI_DIR: ui-client

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          vulnerability-check: true
          license-check: true
          comment-summary-in-pr: always

  ui-lint:
    name: UI Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  ui-typecheck:
    name: UI Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  ui-test:
    name: UI Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        continue-on-error: true
        run: pnpm run format

      - name: Test with coverage
        run: pnpm run test:coverage || pnpm test

      - name: Enforce coverage threshold (>=80%)
        shell: bash
        run: |
          set -euo pipefail
          MIN=80

          mapfile -t LCOV_FILES < <(find . -type f -path '*/coverage/lcov.info')
          if [ ${#LCOV_FILES[@]} -eq 0 ]; then
            mapfile -t COVERAGE_JSON_FILES < <(find . -type f -path '*/coverage/coverage-final.json')
            if [ ${#COVERAGE_JSON_FILES[@]} -eq 0 ]; then
              echo "::error::No coverage report found (expected lcov.info or coverage-final.json)."
              exit 1
            fi

            rm -rf .nyc_output
            mkdir -p .nyc_output
            i=0
            for file in "${COVERAGE_JSON_FILES[@]}"; do
              cp "$file" ".nyc_output/out-$i.json"
              i=$((i + 1))
            done

            npx --yes nyc merge .nyc_output coverage-merged.json >/dev/null
            cp coverage-merged.json .nyc_output/out.json
            NYC_REPORT="$(npx --yes nyc report --reporter=text-summary 2>&1)"
            echo "$NYC_REPORT"
            STMT=$(echo "$NYC_REPORT" | sed -n 's/^Statements[^:]*: *\([0-9.]*\)%.*/\1/p')
            BRANCH=$(echo "$NYC_REPORT" | sed -n 's/^Branches[^:]*: *\([0-9.]*\)%.*/\1/p')
            FN=$(echo "$NYC_REPORT" | sed -n 's/^Functions[^:]*: *\([0-9.]*\)%.*/\1/p')
            LINES=$(echo "$NYC_REPORT" | sed -n 's/^Lines[^:]*: *\([0-9.]*\)%.*/\1/p')

            {
              echo "## UI Coverage Summary"
              echo ""
              echo "- Threshold: ${MIN}%"
              echo "- Statements: ${STMT:-N/A}%"
              echo "- Branches: ${BRANCH:-N/A}%"
              echo "- Functions: ${FN:-N/A}%"
              echo "- Lines: ${LINES:-N/A}%"
            } >> "$GITHUB_STEP_SUMMARY"

            npx --yes nyc check-coverage --lines=$MIN --statements=$MIN --functions=$MIN --branches=$MIN
            exit 0
          fi

          LF=$(awk -F: '/^LF:/ {sum+=$2} END {print sum+0}' "${LCOV_FILES[@]}")
          LH=$(awk -F: '/^LH:/ {sum+=$2} END {print sum+0}' "${LCOV_FILES[@]}")
          FNF=$(awk -F: '/^FNF:/ {sum+=$2} END {print sum+0}' "${LCOV_FILES[@]}")
          FNH=$(awk -F: '/^FNH:/ {sum+=$2} END {print sum+0}' "${LCOV_FILES[@]}")
          BRF=$(awk -F: '/^BRF:/ {sum+=$2} END {print sum+0}' "${LCOV_FILES[@]}")
          BRH=$(awk -F: '/^BRH:/ {sum+=$2} END {print sum+0}' "${LCOV_FILES[@]}")

          lines_pct=$(awk -v h="$LH" -v f="$LF" 'BEGIN { if (f==0) print 0; else printf "%.2f", (h/f)*100 }')
          funcs_pct=$(awk -v h="$FNH" -v f="$FNF" 'BEGIN { if (f==0) print 0; else printf "%.2f", (h/f)*100 }')
          branch_pct=$(awk -v h="$BRH" -v f="$BRF" 'BEGIN { if (f==0) print 0; else printf "%.2f", (h/f)*100 }')

          echo "Coverage summary: lines=${lines_pct}% functions=${funcs_pct}% branches=${branch_pct}% (min=${MIN}%)"
          {
            echo "## UI Coverage Summary"
            echo ""
            echo "- Threshold: ${MIN}%"
            echo "- Lines: ${lines_pct}%"
            echo "- Functions: ${funcs_pct}%"
            echo "- Branches: ${branch_pct}%"
          } >> "$GITHUB_STEP_SUMMARY"

          awk -v l="$lines_pct" -v fn="$funcs_pct" -v b="$branch_pct" -v m="$MIN" 'BEGIN {
            if (l < m || fn < m || b < m) exit 1; else exit 0
          }' || {
            echo "::error::Coverage threshold failed. Required >= ${MIN}% for lines/functions/branches."
            exit 1
          }

  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        continue-on-error: true
        run: |
          pnpm audit --audit-level=moderate 2>&1 || echo "::warning::pnpm audit reported issues"
          pnpm audit --audit-level=high 2>&1 || echo "::warning::High severity vulnerabilities detected"

      - name: Build
        run: pnpm run build

      - name: Bundle size report
        continue-on-error: true
        run: |
          echo "## UI Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          pnpm run size -- --markdown 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

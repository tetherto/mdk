name: MDK UI CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "ui-client/**"
      - ".github/workflows/ui.yaml"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "lts/*"
  PNPM_VERSION: "10.5.0"
  UI_DIR: ui-client

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          vulnerability-check: true
          license-check: true
          comment-summary-in-pr: always

  ui-lint:
    name: UI Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  ui-typecheck:
    name: UI Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  ui-test:
    name: UI Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        continue-on-error: true
        run: pnpm run format

      - name: Test with coverage
        run: pnpm run test:coverage || pnpm test

      - name: Enforce coverage threshold (>=80%)
        shell: bash
        run: |
          set -euo pipefail
          MIN=80

          mapfile -t COVERAGE_JSON_FILES < <(find . -type f -path '*/coverage/coverage-final.json')
          if [ ${#COVERAGE_JSON_FILES[@]} -eq 0 ]; then
            echo "::error::No coverage report found (expected coverage-final.json)."
            exit 1
          fi

          rm -rf .nyc_output
          mkdir -p .nyc_output
          i=0
          for file in "${COVERAGE_JSON_FILES[@]}"; do
            cp "$file" ".nyc_output/out-$i.json"
            i=$((i + 1))
          done

          npx --yes nyc merge .nyc_output coverage-merged.json >/dev/null
          cp coverage-merged.json .nyc_output/out.json
          set +e
          echo "Running nyc check-coverage (threshold ${MIN}%)..."
          npx --yes nyc check-coverage --lines=$MIN --statements=$MIN --functions=$MIN --branches=$MIN
          EXIT=$?
          set -e
          echo "Running nyc report (text-summary)..."
          NYC_REPORT="$(npx --yes nyc report --reporter=text-summary 2>&1)"
          echo "$NYC_REPORT"
          STMT=$(echo "$NYC_REPORT" | sed -n 's/^Statements[^:]*: *\([0-9.]*\)%.*/\1/p')
          BRANCH=$(echo "$NYC_REPORT" | sed -n 's/^Branches[^:]*: *\([0-9.]*\)%.*/\1/p')
          FN=$(echo "$NYC_REPORT" | sed -n 's/^Functions[^:]*: *\([0-9.]*\)%.*/\1/p')
          LINES=$(echo "$NYC_REPORT" | sed -n 's/^Lines[^:]*: *\([0-9.]*\)%.*/\1/p')
          [ -z "$STMT" ] && STMT="—"; [ -z "$BRANCH" ] && BRANCH="—"; [ -z "$FN" ] && FN="—"; [ -z "$LINES" ] && LINES="—"
          [ $EXIT -eq 0 ] && ICON="✅ PASS" || ICON="❌ FAIL"

          {
            echo "## UI Coverage Summary"
            echo ""
            echo "- Status: ${ICON}"
            echo "- Threshold: ${MIN}%"
            echo "- Statements: ${STMT}%"
            echo "- Branches: ${BRANCH}%"
            echo "- Functions: ${FN}%"
            echo "- Lines: ${LINES}%"
          } >> "$GITHUB_STEP_SUMMARY"

          exit $EXIT

  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.UI_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime
        with:
          node_version: ${{ env.NODE_VERSION }}
          package_manager: pnpm
          pnpm_version: ${{ env.PNPM_VERSION }}
          cache_dependency_path: ${{ env.UI_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        continue-on-error: true
        run: |
          pnpm audit --audit-level=moderate 2>&1 || echo "::warning::pnpm audit reported issues"
          pnpm audit --audit-level=high 2>&1 || echo "::warning::High severity vulnerabilities detected"

      - name: Build
        run: pnpm run build

      - name: Bundle size report
        continue-on-error: true
        run: |
          echo "## UI Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          pnpm run size -- --markdown 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

name: 'Node Restore Cache'
description: 'Restore Node.js dependencies from cache'

inputs:
  cache-key:
    description: 'Cache key from setup-node step'
    required: true
  node-version:
    description: 'Node.js version (must match node-setup-cache)'
    required: false
    default: '24.x'

runs:
  using: composite
  steps:
    - name: Restore node modules cache
      id: cache-node-modules
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: node_modules
        key: ${{ inputs.cache-key }}
        restore-keys: |
          node-modules-${{ runner.os }}-${{ inputs.node-version }}-

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
